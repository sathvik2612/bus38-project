{% extends "base.html" %}
{% block title %}Error {{ code }} - Workload Planner{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 fw-bold text-muted">{{ code }}</h1>
    <h2 class="mb-4">{{ message }}</h2>
    <p class="text-muted mb-4">Something went wrong. Please try again.</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg">Go Home</a>
</div>
{% endblock %}
